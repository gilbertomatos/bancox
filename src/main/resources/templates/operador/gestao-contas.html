<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="pt-BR">
<head th:replace="~{fragments/layout :: head('Gestão de Contas')}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container-fluid py-4">
    <div th:replace="~{fragments/alert :: alertas}"></div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-semibold mb-0"><i class="bi bi-people-fill me-2"></i>Gestão de Contas</h4>
    </div>

    <!-- Filtro de status -->
    <form th:action="@{/admin/contas}" method="get" class="row g-2 mb-4">
        <div class="col-auto">
            <select name="status" class="form-select form-select-sm">
                <option value="" th:selected="${filtroStatus == null}">Todos os status</option>
                <option value="ATIVA" th:selected="${filtroStatus == 'ATIVA'}">Apenas Ativas</option>
                <option value="BLOQUEADA" th:selected="${filtroStatus == 'BLOQUEADA'}">Apenas Bloqueadas</option>
            </select>
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-outline-secondary btn-sm">Filtrar</button>
        </div>
    </form>

    <!-- Tabela de contas -->
    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>ID da Conta</th>
                            <th>Cliente</th>
                            <th>CPF</th>
                            <th class="text-end">Saldo</th>
                            <th class="text-center">Status</th>
                            <th class="text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="conta : ${contas}" th:id="'linha-conta-' + ${conta.id}">
                            <td class="font-monospace small" th:text="${conta.id}">—</td>
                            <td th:text="${conta.clienteNome}">—</td>
                            <td class="font-monospace small" th:text="${conta.clienteCpf}">—</td>
                            <td class="text-end font-monospace"
                                th:text="${#numbers.formatCurrency(conta.saldo)}">R$ 0,00</td>
                            <td class="text-center">
                                <span th:if="${conta.status == 'ATIVA'}"
                                      class="badge bg-success">
                                    <i class="bi bi-check-circle-fill"></i> ATIVA
                                </span>
                                <span th:unless="${conta.status == 'ATIVA'}"
                                      class="badge bg-danger">
                                    <i class="bi bi-lock-fill"></i> BLOQUEADA
                                </span>
                            </td>
                            <td class="text-center">
                                <button th:if="${conta.status == 'ATIVA'}"
                                        class="btn btn-sm btn-outline-danger"
                                        data-bs-toggle="modal"
                                        th:attr="data-bs-target='#modal-bloquear-' + ${conta.id}">
                                    <i class="bi bi-lock"></i> Bloquear
                                </button>
                                <button th:unless="${conta.status == 'ATIVA'}"
                                        class="btn btn-sm btn-outline-success"
                                        data-bs-toggle="modal"
                                        th:attr="data-bs-target='#modal-desbloquear-' + ${conta.id}">
                                    <i class="bi bi-unlock"></i> Desbloquear
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modais de bloqueio/desbloqueio -->
    <div th:each="conta : ${contas}">
        <!-- Modal Bloquear -->
        <div th:if="${conta.status == 'ATIVA'}"
             class="modal fade" th:id="'modal-bloquear-' + ${conta.id}" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Bloquear Conta</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <form th:action="@{/admin/contas/bloquear}" method="post">
                        <div class="modal-body">
                            <input type="hidden" name="contaId" th:value="${conta.id}"/>
                            <p class="small text-muted mb-3">
                                Conta: <strong class="font-monospace" th:text="${conta.id}">—</strong>
                            </p>
                            <div class="mb-3">
                                <label class="form-label small fw-semibold">Motivo do bloqueio *</label>
                                <textarea name="motivo" class="form-control" rows="3"
                                          maxlength="255" required
                                          placeholder="Descreva o motivo do bloqueio..."></textarea>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-outline-secondary"
                                    data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-danger">
                                <i class="bi bi-lock me-1"></i> Confirmar bloqueio
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Modal Desbloquear -->
        <div th:unless="${conta.status == 'ATIVA'}"
             class="modal fade" th:id="'modal-desbloquear-' + ${conta.id}" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Desbloquear Conta</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <form th:action="@{/admin/contas/desbloquear}" method="post">
                        <div class="modal-body">
                            <input type="hidden" name="contaId" th:value="${conta.id}"/>
                            <p class="small text-muted mb-3">
                                Conta: <strong class="font-monospace" th:text="${conta.id}">—</strong>
                            </p>
                            <div class="mb-3">
                                <label class="form-label small fw-semibold">Motivo do desbloqueio *</label>
                                <textarea name="motivo" class="form-control" rows="3"
                                          maxlength="255" required
                                          placeholder="Descreva o motivo do desbloqueio..."></textarea>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-outline-secondary"
                                    data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-success">
                                <i class="bi bi-unlock me-1"></i> Confirmar desbloqueio
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script crossorigin="anonymous"
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
