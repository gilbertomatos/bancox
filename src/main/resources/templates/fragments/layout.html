<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(titulo)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${titulo} + ' — BancoX'">BancoX</title>
    <link rel="stylesheet" crossorigin="anonymous"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" crossorigin="anonymous"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <script crossorigin="anonymous"
            src="https://unpkg.com/htmx.org@2.0.0/dist/htmx.min.js"></script>
    <script crossorigin="anonymous"
            src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" th:href="@{/css/bancox.css}"/>
</head>
<body>
<nav th:fragment="navbar" class="navbar navbar-dark bg-primary px-3">
    <a class="navbar-brand fw-bold" th:href="@{/}"><i class="bi bi-bank2"></i> BancoX</a>
    <div class="d-flex align-items-center gap-3">
        <span class="text-white small" sec:authentication="name">Usuário</span>
        <form th:action="@{/auth/logout}" method="post" class="m-0">
            <button type="submit" class="btn btn-outline-light btn-sm">
                <i class="bi bi-box-arrow-right"></i> Sair
            </button>
        </form>
    </div>
</nav>
</body>
</html>
