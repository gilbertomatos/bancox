<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="pt-BR">
<head th:replace="~{fragments/layout :: head('Dashboard')}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container py-4">
    <div th:replace="~{fragments/alert :: alertas}"></div>

    <!-- Cartão de Saldo -->
    <div id="cartao-saldo" class="card text-white bg-primary mb-4 shadow-sm">
        <div class="card-body p-4">
            <div class="d-flex justify-content-between align-items-start">
                <div>
                    <p class="small opacity-75 mb-1">Saldo disponível</p>
                    <h2 class="fw-bold font-monospace mb-0"
                        th:text="${#numbers.formatCurrency(conta.saldo)}">R$ 0,00</h2>
                </div>
                <div>
                    <span th:if="${conta.bloqueada}"
                          class="badge bg-warning text-dark">
                        <i class="bi bi-lock-fill"></i> BLOQUEADA
                    </span>
                    <span th:unless="${conta.bloqueada}"
                          class="badge bg-success">
                        <i class="bi bi-check-circle"></i> ATIVA
                    </span>
                </div>
            </div>
        </div>
    </div>

    <!-- Abas de operações -->
    <div class="card shadow-sm mb-4">
        <div class="card-header">
            <ul class="nav nav-tabs card-header-tabs" role="tablist">
                <li class="nav-item">
                    <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#aba-deposito">
                        <i class="bi bi-arrow-up-circle me-1"></i> Depósito
                    </button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" data-bs-toggle="tab" data-bs-target="#aba-saque">
                        <i class="bi bi-arrow-down-circle me-1"></i> Saque
                    </button>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/transferencia}">
                        <i class="bi bi-arrow-left-right me-1"></i> Transferência
                    </a>
                </li>
            </ul>
        </div>
        <div class="card-body">
            <div class="tab-content">

                <!-- Depósito -->
                <div class="tab-pane fade show active" id="aba-deposito">
                    <form th:action="@{/contas/credito}" method="post" class="row g-3">
                        <div class="col-sm-8">
                            <label class="form-label small fw-semibold">Valor do depósito (R$)</label>
                            <input type="number" name="valor" class="form-control"
                                   step="0.01" min="0.01" placeholder="0,00"
                                   th:disabled="${conta.bloqueada}" required/>
                        </div>
                        <div class="col-sm-4 d-flex align-items-end">
                            <button type="submit" class="btn btn-primary w-100"
                                    th:disabled="${conta.bloqueada}">
                                <i class="bi bi-arrow-up-circle-fill me-1"></i> Depositar
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Saque -->
                <div class="tab-pane fade" id="aba-saque">
                    <form th:action="@{/contas/debito}" method="post" class="row g-3">
                        <div class="col-sm-8">
                            <label class="form-label small fw-semibold">Valor do saque (R$)</label>
                            <input type="number" name="valor" class="form-control"
                                   step="0.01" min="0.01" placeholder="0,00"
                                   th:disabled="${conta.bloqueada}" required/>
                        </div>
                        <div class="col-sm-4 d-flex align-items-end">
                            <button type="submit" class="btn btn-danger w-100"
                                    th:disabled="${conta.bloqueada}">
                                <i class="bi bi-arrow-down-circle-fill me-1"></i> Sacar
                            </button>
                        </div>
                    </form>
                </div>

            </div>
        </div>
    </div>

    <!-- Últimas movimentações -->
    <div class="card shadow-sm">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span class="h6 text-muted mb-0">Últimas movimentações</span>
            <a th:href="@{/extrato}" class="btn btn-outline-secondary btn-sm">
                Ver extrato completo <i class="bi bi-arrow-right"></i>
            </a>
        </div>
        <div class="card-body p-0">
            <div th:if="${#lists.isEmpty(preview)}" class="text-center text-muted py-4 small">
                Nenhuma movimentação registrada.
            </div>
            <ul th:unless="${#lists.isEmpty(preview)}" class="list-group list-group-flush">
                <li th:each="l : ${preview}" class="list-group-item d-flex justify-content-between align-items-center py-3">
                    <div class="d-flex align-items-center gap-2">
                        <i th:classappend="${l.tipo == 'credito'} ? 'bi-arrow-up-circle-fill text-success' : (${l.tipo == 'debito'} ? 'bi-arrow-down-circle-fill text-danger' : 'bi-arrow-left-right text-secondary')"
                           class="bi fs-5"></i>
                        <div>
                            <div class="small fw-semibold text-capitalize" th:text="${l.tipo}">tipo</div>
                            <div class="small text-muted"
                                 th:text="${#temporals.format(l.timestamp, 'dd/MM/yyyy HH:mm')}">data</div>
                        </div>
                    </div>
                    <span class="font-monospace fw-semibold"
                          th:classappend="${l.tipo == 'credito'} ? 'text-success' : 'text-danger'"
                          th:text="${#numbers.formatCurrency(l.valor)}">R$ 0,00</span>
                </li>
            </ul>
        </div>
    </div>
</div>

<script crossorigin="anonymous"
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
