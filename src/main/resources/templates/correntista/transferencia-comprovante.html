<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="pt-BR">
<head th:replace="~{fragments/layout :: head('Comprovante')}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container py-4" style="max-width: 560px;">
    <div class="card shadow-sm text-center">
        <div class="card-body p-5">
            <i class="bi bi-check-circle-fill text-success" style="font-size: 3rem;"></i>
            <h4 class="fw-semibold mt-3">Transferência realizada!</h4>
            <p class="text-muted small mb-4">
                Valor transferido:
                <strong class="font-monospace"
                        th:text="${#numbers.formatCurrency(valor)}">R$ 0,00</strong><br/>
                <span th:text="${#temporals.format(timestamp, 'dd/MM/yyyy HH:mm')}">—</span>
            </p>
            <a th:href="@{/}" class="btn btn-primary me-2">
                <i class="bi bi-house-fill me-1"></i> Início
            </a>
            <a th:href="@{/extrato}" class="btn btn-outline-secondary">
                Ver extrato
            </a>
        </div>
    </div>
</div>

<script crossorigin="anonymous"
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
