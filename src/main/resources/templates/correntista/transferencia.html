<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="pt-BR">
<head th:replace="~{fragments/layout :: head('Transferência')}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container py-4" style="max-width: 560px;">
    <div th:replace="~{fragments/alert :: alertas}"></div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-semibold mb-0"><i class="bi bi-arrow-left-right me-2"></i>Transferência</h4>
        <a th:href="@{/}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> Voltar
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-4">
            <p class="small text-muted mb-3">
                Saldo disponível:
                <strong class="font-monospace text-primary"
                        th:text="${#numbers.formatCurrency(saldoAtual)}">R$ 0,00</strong>
            </p>

            <form th:action="@{/transferencia}" method="post">
                <div class="mb-3">
                    <label class="form-label small fw-semibold">ID da conta de destino</label>
                    <input type="text" name="contaDestino" class="form-control font-monospace"
                           placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" required/>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-semibold">Valor (R$)</label>
                    <input type="number" name="valor" class="form-control"
                           step="0.01" min="0.01" placeholder="0,00" required/>
                </div>
                <button type="submit" class="btn btn-primary w-100">
                    Continuar <i class="bi bi-arrow-right ms-1"></i>
                </button>
            </form>
        </div>
    </div>
</div>

<script crossorigin="anonymous"
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
