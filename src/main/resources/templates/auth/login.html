<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments/layout :: head('Login')}"></head>
<body class="bg-light">

<div class="min-vh-100 d-flex align-items-center justify-content-center">
    <div class="card shadow-sm" style="width: 380px;">
        <div class="card-body p-4">
            <div class="text-center mb-4">
                <i class="bi bi-bank2 text-primary fs-1"></i>
                <h4 class="fw-semibold mt-2">BancoX</h4>
                <p class="text-muted small">Acesse sua conta com segurança</p>
            </div>

            <div th:if="${erro}" class="alert alert-danger py-2 small">
                <i class="bi bi-exclamation-triangle-fill me-1"></i>
                <span th:text="${erro}">Erro</span>
            </div>
            <div th:if="${sucesso}" class="alert alert-success py-2 small">
                <i class="bi bi-check-circle-fill me-1"></i>
                <span th:text="${sucesso}">Sucesso</span>
            </div>

            <form th:action="@{/auth/login}" method="post">
                <div class="mb-3">
                    <label class="form-label small fw-semibold">CPF</label>
                    <input type="text" name="cpf" class="form-control"
                           placeholder="000.000.000-00" maxlength="11"
                           inputmode="numeric" autocomplete="username" required/>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-semibold">Senha</label>
                    <input type="password" name="senha" class="form-control"
                           autocomplete="current-password" required/>
                </div>
                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-lock-fill me-1"></i> Entrar
                </button>
            </form>
        </div>
    </div>
</div>

<script crossorigin="anonymous"
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
