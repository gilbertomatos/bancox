spring:
  application:
    name: bancox

  datasource:
    url: jdbc:postgresql://localhost:5432/bancox
    username: ${DB_USERNAME:bancox}
    password: ${DB_PASSWORD:bancox}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # NUNCA usar update em produção — migrações via Flyway (DA-02)
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Virtual Threads — Java 21 Project Loom (DA-18)
  threads:
    virtual:
      enabled: true

  # Graceful Shutdown — aguarda requisições em andamento (DA-19)
  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  port: 8080
  shutdown: graceful   # DA-19 — SIGTERM drena requisições antes de encerrar
  error:
    # Nunca expor stack trace ao cliente (DA-07)
    include-stacktrace: never
    include-message: never

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# Actuator — exposição mínima pública (DA-20 / OWASP A05)
management:
  endpoints:
    web:
      exposure:
        include: health, info
      base-path: /actuator
  endpoint:
    health:
      show-details: never   # nunca expor detalhes sem autenticação (DA-20)
  info:
    git:
      mode: simple

logging:
  level:
    com.bancox: INFO
    org.flywaydb: INFO
  pattern:
    # JSON estruturado para produção (DA-07)
    console: '{"timestamp":"%d{yyyy-MM-dd HH:mm:ss}","level":"%level","logger":"%logger{36}","message":"%msg"}%n'

app:
  jwt:
    # NÃO fornecer valor default — startup falha sem JWT_SECRET (DA-14)
    secret: ${JWT_SECRET}
    expiration-ms: 900000       # 15 minutos — access token em cookie httpOnly
    # Cookie JWT — httpOnly, Secure, SameSite=Strict (DA-26)
    cookie:
      name: bancox_token
      http-only: true
      secure: false             # true em produção (application-prod.yml)
      same-site: Strict
      max-age: 900              # segundos — igual ao expiration-ms

---
spring:
  config:
    activate:
      on-profile: dev

  jpa:
    show-sql: true

logging:
  level:
    com.bancox: DEBUG
