spring:
  datasource:
    url: jdbc:h2:mem:bancox_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  flyway:
    enabled: false

  # Virtual Threads desabilitadas em testes — comportamento mais previsível
  threads:
    virtual:
      enabled: false

  lifecycle:
    timeout-per-shutdown-phase: 5s

server:
  shutdown: immediate   # testes encerram imediatamente

management:
  endpoints:
    web:
      exposure:
        include: health

app:
  jwt:
    secret: test-secret-key-for-testing-only-minimum-256-bits-aaaa
    expiration-ms: 900000
    refresh-expiration-ms: 604800000

logging:
  level:
    com.bancox: DEBUG
